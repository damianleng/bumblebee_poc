services:
  db:
    image: postgres:16
    container_name: bumblebee-dev-db
    environment:
      POSTGRES_DB: bumblebee_poc
      POSTGRES_USER: bumblebee
      POSTGRES_PASSWORD: bumblebee
    ports:
      - "5432:5432"
    volumes:
      - bumblebee_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bumblebee-dev-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - uploads_data_dev:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bumblebee-dev-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "8080:8080"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bumblebee_dev_data:
  uploads_data_dev:
